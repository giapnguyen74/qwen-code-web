<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwen-code-web</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg:           #1a1b26;
      --surface:      #16161e;
      --surface2:     #1e2030;
      --border:       #2a2b3d;
      --text:         #c0caf5;
      --text-muted:   #565f89;
      --accent:       #7aa2f7;
      --green:        #9ece6a;
      --red:          #f7768e;
      --yellow:       #e0af68;
      --orange:       #ff9e64;
      --font-sans:    'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 48px;
    }

    #header-logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    #header-sep {
      color: var(--border);
      font-size: 18px;
      font-weight: 200;
    }

    #project-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    #status-badge.starting { background: rgba(224,175,104,0.12); color: var(--yellow); }
    #status-badge.running  { background: rgba(158,206,106,0.12); color: var(--green); }
    #status-badge.stopped  { background: rgba(247,118,142,0.12); color: var(--red); }

    #stop-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #stop-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Conversation ────────────────────────────────────────────────── */
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    #conversation::-webkit-scrollbar { width: 5px; }
    #conversation::-webkit-scrollbar-track { background: transparent; }
    #conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message rows ────────────────────────────────────────────────── */
    .msg-row {
      padding: 6px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-row:hover { background: rgba(255,255,255,0.01); }

    .msg-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .msg-label.user      { color: var(--accent); }
    .msg-label.assistant { color: var(--green); }

    .msg-body { font-size: 14px; }

    /* User text */
    .user-text {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Markdown / assistant text ───────────────────────────────────── */
    .md p             { margin-bottom: 8px; }
    .md p:last-child  { margin-bottom: 0; }
    .md h1, .md h2, .md h3 { color: var(--accent); margin: 14px 0 6px; font-size: 1em; }
    .md h1 { font-size: 1.1em; }
    .md ul, .md ol    { padding-left: 20px; margin-bottom: 8px; }
    .md li            { margin-bottom: 3px; }
    .md code {
      font-family: var(--font-mono);
      font-size: 12.5px;
      background: rgba(255,255,255,0.07);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .md pre {
      background: #0d0e14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .md pre code {
      background: transparent;
      padding: 0;
      font-size: 12.5px;
    }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .md table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .md th, .md td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .md th { background: var(--surface); color: var(--accent); }
    .md a  { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }

    /* Streaming cursor */
    .streaming::after {
      content: '▋';
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: var(--accent);
      margin-left: 1px;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* ── Tool use card ───────────────────────────────────────────────── */
    .tool-card {
      background: #0d0e14;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin: 6px 0;
      overflow: hidden;
      font-family: var(--font-mono);
    }
    .tool-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      user-select: none;
    }
    .tool-card-header:hover { background: rgba(255,255,255,0.04); }
    .tool-card-icon { color: var(--text-muted); font-size: 12px; }
    .tool-card-name { font-size: 12px; color: var(--yellow); font-weight: 600; }
    .tool-card-toggle { margin-left: auto; font-size: 10px; color: var(--text-muted); }
    .tool-card-body {
      padding: 10px 12px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .tool-card-body.hidden { display: none; }

    /* ── Tool result card ────────────────────────────────────────────── */
    .result-card {
      background: #0b0c12;
      border: 1px solid var(--border);
      border-left: 3px solid var(--text-muted);
      border-radius: 4px;
      margin: 4px 0;
      font-family: var(--font-mono);
    }
    .result-card-header {
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .result-card-header:hover { color: var(--text); }
    .result-card-body {
      padding: 8px 10px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      border-top: 1px solid var(--border);
      max-height: 200px;
      overflow-y: auto;
    }
    .result-card-body.hidden { display: none; }
    .result-card-body::-webkit-scrollbar { width: 4px; }
    .result-card-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Approval card ───────────────────────────────────────────────── */
    .approval-row {
      padding: 8px 24px;
    }
    .approval-card {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: rgba(122,162,247,0.05);
      padding: 14px 16px;
    }
    .approval-card.resolved {
      border-color: var(--border);
      background: transparent;
      opacity: 0.55;
    }
    .approval-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .approval-tool-name {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--yellow);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .approval-input {
      background: #0d0e14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 12px;
      max-height: 160px;
      overflow-y: auto;
    }
    .approval-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 6px 16px;
      border-radius: 5px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.82; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-allow { background: var(--green); color: #1a1b26; }
    .btn-deny  { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .approval-outcome {
      font-size: 12px;
      font-weight: 600;
      display: none;
    }
    .approval-outcome.show { display: inline; }
    .approval-outcome.allowed { color: var(--green); }
    .approval-outcome.denied  { color: var(--red); }

    /* ── Session notices ─────────────────────────────────────────────── */
    .notice {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notice::before, .notice::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Usage line ──────────────────────────────────────────────────── */
    .usage-line {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Input area ──────────────────────────────────────────────────── */
    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: 200px;
      line-height: 1.55;
      outline: none;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    #message-input:focus { border-color: var(--accent); }
    #message-input::placeholder { color: var(--text-muted); }
    #message-input::-webkit-scrollbar { width: 4px; }
    #message-input::-webkit-scrollbar-thumb { background: var(--border); }

    #input-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    #send-btn {
      background: var(--accent);
      color: #1a1b26;
      border: none;
      border-radius: 7px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      height: 44px;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    #sending-label {
      font-size: 11px;
      color: var(--text-muted);
      display: none;
      white-space: nowrap;
    }
    #sending-label.show { display: block; }

    /* ── Working indicator ────────────────────────────────────────────────── */
    #working-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--yellow);
      white-space: nowrap;
    }
    #working-indicator.show { display: flex; }
    #working-spinner { font-size: 14px; line-height: 1; }
    #working-elapsed { color: var(--text-muted); font-size: 11px; }
  </style>
</head>
<body>

<div id="header">
  <span id="header-logo">qwen-code-web</span>
  <span id="header-sep">/</span>
  <span id="project-name">—</span>
  <div id="header-right">
    <div id="working-indicator">
      <span id="working-spinner">⠻</span>
      <span id="working-label">Working...</span>
      <span id="working-elapsed"></span>
    </div>
    <span id="status-badge" class="starting">● starting</span>
    <button id="stop-btn">stop</button>
  </div>
</div>

<div id="conversation"></div>

<div id="input-area">
  <textarea
    id="message-input"
    placeholder="Message Qwen Code… (Enter to send, Shift+Enter for newline)"
    rows="1"
  ></textarea>
  <div id="input-right">
    <button id="send-btn" disabled>Send</button>
    <span id="sending-label">sending…</span>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.host}/events`;

// ── Marked setup ─────────────────────────────────────────────────────────
marked.setOptions({ gfm: true, breaks: true });

function renderMarkdown(text) {
  const html = marked.parse(text || '');
  // We apply hljs after inserting into DOM
  return html;
}

function applyHighlight(el) {
  el.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function scrollToBottom() {
  const c = document.getElementById('conversation');
  c.scrollTop = c.scrollHeight;
}

// ── DOM refs ──────────────────────────────────────────────────────────────
const conversationEl  = document.getElementById('conversation');
const inputEl         = document.getElementById('message-input');
const sendBtn         = document.getElementById('send-btn');
const stopBtn         = document.getElementById('stop-btn');
const statusBadge     = document.getElementById('status-badge');
const projectNameEl   = document.getElementById('project-name');
const sendingLabel    = document.getElementById('sending-label');
const workingIndicator = document.getElementById('working-indicator');
const workingSpinner   = document.getElementById('working-spinner');
const workingElapsedEl = document.getElementById('working-elapsed');

// ── Working spinner ───────────────────────────────────────────────────────
const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
let spinnerIdx   = 0;
let workingStart = null;
let workingTimer = null;

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `(${s}s)`;
  return `(${Math.floor(s / 60)}m ${s % 60}s)`;
}

function startWorking() {
  if (workingTimer) return; // already running
  workingStart = Date.now();
  spinnerIdx = 0;
  workingSpinner.textContent = SPINNER_FRAMES[0];
  workingElapsedEl.textContent = '(0s)';
  workingIndicator.classList.add('show');
  workingTimer = setInterval(() => {
    workingSpinner.textContent = SPINNER_FRAMES[spinnerIdx++ % SPINNER_FRAMES.length];
    workingElapsedEl.textContent = formatElapsed(Date.now() - workingStart);
  }, 100);
}

function stopWorking() {
  if (workingTimer) { clearInterval(workingTimer); workingTimer = null; }
  workingStart = null;
  workingIndicator.classList.remove('show');
}

// ── State ─────────────────────────────────────────────────────────────────
let sessionStatus = 'starting';

// Current streaming assistant message row
let streamingRow      = null;  // the .msg-row div
let streamingBody     = null;  // the .msg-body div inside it
let streamingText     = '';    // accumulated raw text

// ── Status ────────────────────────────────────────────────────────────────
function setStatus(status, sessionId) {
  sessionStatus = status;
  const labels = { starting: '● starting', running: '● running', stopped: '○ stopped' };
  statusBadge.textContent = labels[status] || status;
  statusBadge.className = status;
  sendBtn.disabled = (status !== 'running');
}

// ── Toggle collapsible cards ──────────────────────────────────────────────
function toggleCard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const body   = el.querySelector('.tool-card-body, .result-card-body');
  const toggle = el.querySelector('.tool-card-toggle');
  if (!body) return;
  const collapsed = body.classList.toggle('hidden');
  if (toggle) toggle.textContent = collapsed ? '▾ show' : '▴ hide';
}

// ── Render a tool-use block ───────────────────────────────────────────────
function renderToolUseBlock(block) {
  const id = `tc-${block.id || Math.random().toString(36).slice(2)}`;
  const inputJson = JSON.stringify(block.input, null, 2);
  const div = document.createElement('div');
  div.className = 'tool-card';
  div.id = id;
  div.innerHTML = `
    <div class="tool-card-header" onclick="toggleCard('${id}')">
      <span class="tool-card-icon">⚙</span>
      <span class="tool-card-name">${esc(block.name || 'tool')}</span>
      <span class="tool-card-toggle">▾ show</span>
    </div>
    <div class="tool-card-body hidden">${esc(inputJson)}</div>
  `;
  return div;
}

// ── Render a tool-result block ────────────────────────────────────────────
function renderToolResultBlock(block) {
  const id = `rc-${block.tool_use_id || Math.random().toString(36).slice(2)}`;
  const content = typeof block.content === 'string'
    ? block.content
    : JSON.stringify(block.content, null, 2);
  const div = document.createElement('div');
  div.className = 'result-card';
  div.id = id;
  div.innerHTML = `
    <div class="result-card-header" onclick="toggleCard('${id}')">▾ tool result</div>
    <div class="result-card-body hidden">${esc(content)}</div>
  `;
  return div;
}

// ── Render user message ───────────────────────────────────────────────────
function renderUserEvent(ev) {
  if (!ev.message?.content) return;

  const textBlocks   = ev.message.content.filter(b => b.type === 'text' && b.text);
  const resultBlocks = ev.message.content.filter(b => b.type === 'tool_result');

  // Plain user text → "You" row
  if (textBlocks.length > 0) {
    const text = textBlocks.map(b => b.text).join('\n');
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="msg-label user">You</div>
      <div class="msg-body"><div class="user-text">${esc(text)}</div></div>
    `;
    conversationEl.appendChild(row);
    scrollToBottom();
  }

  // Tool results → compact result cards (no "You" label)
  if (resultBlocks.length > 0) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    const body = document.createElement('div');
    body.className = 'msg-body';
    for (const block of resultBlocks) {
      body.appendChild(renderToolResultBlock(block));
    }
    row.appendChild(body);
    conversationEl.appendChild(row);
    scrollToBottom();
  }
}

// ── Streaming: start / append / finalize ─────────────────────────────────

function startStreamingMessage() {
  // Clean up any orphaned streaming row (e.g. during replay)
  if (streamingRow) {
    streamingRow.dataset.streaming = '';
    streamingRow = null;
    streamingBody = null;
    streamingText = '';
  }

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.dataset.streaming = 'true';
  row.innerHTML = `
    <div class="msg-label assistant">Qwen</div>
    <div class="msg-body"><span class="md streaming"></span></div>
  `;
  conversationEl.appendChild(row);
  streamingRow  = row;
  streamingBody = row.querySelector('.md');
  streamingText = '';
  scrollToBottom();
}

function appendStreamingText(text) {
  if (!streamingBody) startStreamingMessage();
  streamingText += text;
  // Show raw text during streaming (fast, no markdown processing)
  streamingBody.textContent = streamingText;
  streamingBody.classList.add('streaming');
  scrollToBottom();
}

// ── Render completed assistant message (replaces streaming row) ───────────
function renderAssistantEvent(ev) {
  // Remove the streaming placeholder
  if (streamingRow) {
    streamingRow.remove();
    streamingRow  = null;
    streamingBody = null;
    streamingText = '';
  }

  if (!ev.message?.content) return;

  const row = document.createElement('div');
  row.className = 'msg-row';

  const label = document.createElement('div');
  label.className = 'msg-label assistant';
  label.textContent = 'Qwen';

  const body = document.createElement('div');
  body.className = 'msg-body';

  for (const block of ev.message.content) {
    if (block.type === 'text' && block.text) {
      const md = document.createElement('div');
      md.className = 'md';
      md.innerHTML = renderMarkdown(block.text);
      applyHighlight(md);
      body.appendChild(md);
    } else if (block.type === 'tool_use') {
      body.appendChild(renderToolUseBlock(block));
    }
  }

  // Token usage
  if (ev.message.usage) {
    const { input_tokens, output_tokens } = ev.message.usage;
    const usage = document.createElement('div');
    usage.className = 'usage-line';
    usage.textContent = `${input_tokens} in · ${output_tokens} out`;
    body.appendChild(usage);
  }

  row.appendChild(label);
  row.appendChild(body);
  conversationEl.appendChild(row);
  scrollToBottom();
}

// ── Approval cards ────────────────────────────────────────────────────────
const pendingApprovals = {};

function renderApprovalCard(ev) {
  const { request_id, request } = ev;
  const inputJson = JSON.stringify(request.input, null, 2);

  const row = document.createElement('div');
  row.className = 'approval-row';
  row.innerHTML = `
    <div class="approval-card" id="ap-card-${esc(request_id)}">
      <div class="approval-title">⚠ Tool request</div>
      <div class="approval-tool-name">${esc(request.tool_name || 'unknown')}</div>
      <div class="approval-input">${esc(inputJson)}</div>
      <div class="approval-actions">
        <button class="btn btn-allow" id="ap-allow-${esc(request_id)}"
          onclick="sendApproval('${esc(request_id)}', true)">Allow</button>
        <button class="btn btn-deny" id="ap-deny-${esc(request_id)}"
          onclick="sendApproval('${esc(request_id)}', false)">Deny</button>
        <span class="approval-outcome" id="ap-outcome-${esc(request_id)}"></span>
      </div>
    </div>
  `;

  conversationEl.appendChild(row);
  pendingApprovals[request_id] = row;
  scrollToBottom();
}

function resolveApprovalCard(requestId, allowed) {
  const row = document.getElementById(`ap-card-${requestId}`);
  if (!row) return;

  row.classList.add('resolved');
  const allowBtn  = document.getElementById(`ap-allow-${requestId}`);
  const denyBtn   = document.getElementById(`ap-deny-${requestId}`);
  const outcomeEl = document.getElementById(`ap-outcome-${requestId}`);

  if (allowBtn)  allowBtn.disabled  = true;
  if (denyBtn)   denyBtn.disabled   = true;
  if (outcomeEl) {
    outcomeEl.classList.add('show');
    if (allowed === true) {
      outcomeEl.classList.add('allowed');
      outcomeEl.textContent = '✓ Allowed';
    } else if (allowed === false) {
      outcomeEl.classList.add('denied');
      outcomeEl.textContent = '✗ Denied';
    } else {
      outcomeEl.textContent = 'Resolved';
    }
  }

  delete pendingApprovals[requestId];
}

async function sendApproval(requestId, allowed) {
  const allowBtn = document.getElementById(`ap-allow-${requestId}`);
  const denyBtn  = document.getElementById(`ap-deny-${requestId}`);
  if (allowBtn) allowBtn.disabled = true;
  if (denyBtn)  denyBtn.disabled  = true;

  try {
    await fetch('/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId, allowed }),
    });
  } catch (err) {
    console.error('Failed to send approval:', err);
    if (allowBtn) allowBtn.disabled = false;
    if (denyBtn)  denyBtn.disabled  = false;
  }
}

// ── Main event handler ────────────────────────────────────────────────────
let isReplaying = false;

function handleQwenEvent(ev) {
  switch (ev.type) {

    case 'system':
      if (ev.subtype === 'session_start') {
        const cwd  = ev.data?.cwd || '';
        const name = cwd.split('/').filter(Boolean).pop() || cwd || '—';
        projectNameEl.textContent = cwd || name;
        const note = document.createElement('div');
        note.className = 'notice';
        note.textContent = `session started · ${cwd}`;
        conversationEl.appendChild(note);
        scrollToBottom();
      } else if (ev.subtype === 'session_end') {
        stopWorking();
        const note = document.createElement('div');
        note.className = 'notice';
        note.textContent = 'session ended';
        conversationEl.appendChild(note);
        scrollToBottom();
      }
      break;

    case 'stream_event': {
      const sev = ev.event;
      if (!sev) break;
      if (sev.type === 'message_start') {
        startStreamingMessage();
        if (!isReplaying) startWorking();
      } else if (
        sev.type === 'content_block_delta' &&
        sev.delta?.type === 'text_delta' &&
        sev.delta.text
      ) {
        appendStreamingText(sev.delta.text);
      }
      break;
    }

    case 'assistant':
      stopWorking();
      renderAssistantEvent(ev);
      break;

    case 'user':
      renderUserEvent(ev);
      break;

    case 'control_request':
      stopWorking(); // waiting for human approval — no longer "working"
      renderApprovalCard(ev);
      break;

    case 'control_response':
      if (ev.response?.request_id) {
        const allowed = ev.response.response?.allowed;
        resolveApprovalCard(ev.response.request_id, allowed);
      }
      break;
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(WS_URL);

  ws.onopen = () => console.log('[ws] connected');

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'server_status') {
      setStatus(msg.status, msg.sessionId);
      return;
    }

    if (msg.type === 'replay_start') {
      // Clear conversation and reset streaming state before replay
      isReplaying = true;
      conversationEl.innerHTML = '';
      streamingRow  = null;
      streamingBody = null;
      streamingText = '';
      return;
    }

    if (msg.type === 'replay_end') {
      isReplaying = false;
      scrollToBottom();
      return;
    }

    if (msg.type === 'qwen_event') {
      handleQwenEvent(msg.data);
    }
  };

  ws.onclose = () => {
    console.log('[ws] disconnected — reconnecting in 2s…');
    setTimeout(connect, 2000);
  };

  ws.onerror = (err) => console.error('[ws] error', err);
}

connect();

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sessionStatus !== 'running') return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  sendingLabel.classList.add('show');

  try {
    const res = await fetch('/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      console.error('Send failed:', err);
    }
  } catch (err) {
    console.error('Send error:', err);
  } finally {
    sendingLabel.classList.remove('show');
    sendBtn.disabled = (sessionStatus !== 'running');
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Stop button
stopBtn.addEventListener('click', async () => {
  if (!confirm('Stop the Qwen Code session?')) return;
  try {
    await fetch('/stop', { method: 'POST' });
  } catch (err) {
    console.error('Stop error:', err);
  }
});

// Fetch initial status (shows project dir even before first WS message)
fetch('/status')
  .then(r => r.json())
  .then(data => {
    if (data.projectDir) {
      const name = data.projectDir.split('/').filter(Boolean).pop() || data.projectDir;
      projectNameEl.textContent = data.projectDir;
    }
    setStatus(data.status, data.sessionId);
  })
  .catch(console.error);
</script>
