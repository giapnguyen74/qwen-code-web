<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>qwen-code-web</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/app.css">
</head>
<body>

<div id="header">
  <a id="back-btn" href="/">← Dashboard</a>
  <span id="header-sep">/</span>
  <span id="project-name">—</span>
  <div id="header-right">
    <button id="browse-btn" class="header-action-btn" onclick="toggleSidebar()">📁 Files</button>
    <span id="status-badge" class="starting">● idle</span>
    <button id="start-btn" class="header-action-btn" style="display:none">▶ start</button>
    <button id="stop-btn" class="header-action-btn" style="display:none">stop</button>
  </div>
</div>

<div id="main-wrapper">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">Project Files</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="header-action-btn" onclick="refreshTree()" style="padding: 2px 6px;" title="Refresh Files">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
        </button>
        <button class="header-action-btn" onclick="uploadToFolder('')" style="padding: 2px 6px;" title="Upload to Root">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <button class="header-action-btn" onclick="toggleSidebar()" style="padding: 2px 6px;">✕</button>
      </div>
    </div>
    <div id="sidebar-list"></div>
  </div>

  <div id="chat-area">
    <div id="conversation"></div>

    <!-- File Viewer Panel (replaces conversation when active) -->
    <div id="file-viewer-panel" style="display:none; flex:1; flex-direction:column; overflow:hidden; background:var(--bg); min-height:0;">
      <div style="padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surface2);">
        <div id="fv-title" style="font-weight:600; font-family:var(--font-mono); font-size:13px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">filename.txt</div>
        <div style="display:flex; align-items:center; gap:16px;">
          <button id="fv-download-btn" class="header-action-btn" onclick="downloadCurrentFile()" style="padding: 2px 6px;" title="Download">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          <button id="md-toggle-btn" class="header-action-btn" onclick="toggleMarkdownView()" style="display:none;">👁 Render</button>
          <button class="header-action-btn" onclick="closeFileViewer()" style="padding: 2px 6px;" title="Close Viewer">✕</button>
        </div>
      </div>
      <div id="fv-content" style="flex:1; overflow:auto; position:relative;"></div>
    </div>

    <div id="input-area">
      <textarea
        id="message-input"
        placeholder="Message Qwen Code… (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <div id="input-right">
        <div class="input-actions-row">
          <button id="cancel-btn" title="Clear Text / Cancel" style="display: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <button id="mic-btn" title="Voice Input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          </button>
          <button id="send-btn" disabled>Send</button>
        </div>
        <span id="sending-label">sending…</span>
      </div>
    </div>
  </div>
</div>

<!-- Origin Modal -->
<div id="origin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index:10000; align-items:center; justify-content:center; flex-direction:column;">
  <div style="background:var(--surface); padding:24px; border-radius:12px; border:1px solid var(--red); width:400px; text-align:center;">
    <div style="font-size:16px; font-weight:600; margin-bottom:16px; color:var(--red);">Origin Not Allowed</div>
    <div style="font-size:13px; color:var(--text); margin-bottom:16px; line-height:1.5;">
      Your connection was blocked by the server's same-origin security policy.<br><br>
      Please configure your origin in <code>~/.qwen-code-web/settings.json</code>:<br>
      <code style="display:block; margin:8px 0; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; text-align:left;">"origins": ["<span class="warning-origin-url"></span>"]</code>
      Or launch with <code>--origins <span class="warning-origin-url"></span></code>.
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index:10000; align-items:center; justify-content:center; flex-direction:column;">
  <div style="background:var(--surface); padding:24px; border-radius:12px; border:1px solid var(--border); width:300px;">
    <div style="font-size:16px; font-weight:600; margin-bottom:16px;">Authentication Required</div>
    <div style="margin-bottom:8px; font-size:12px; color:var(--text-muted);">Password</div>
    <input type="password" id="auth-password" style="width:100%; background:var(--bg); border:1px solid var(--border); padding:8px 12px; border-radius:6px; color:var(--text); margin-bottom:8px;" onkeydown="if(event.key==='Enter') submitAuth()">
    <div id="auth-error" style="color:var(--red); font-size:12px; margin-bottom:16px; min-height:16px;"></div>
    <button style="width:100%; background:var(--accent); color:var(--bg); padding:8px 12px; border:none; border-radius:6px; cursor:pointer; font-weight:600;" onclick="submitAuth()">Login</button>
  </div>
</div>
<!-- Global Dropdown Menu -->
<div id="action-dropdown" class="dropdown-menu"></div>

<script src="/public/app.js"></script>
</body>
</html>
